<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Calendar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1 id="month-year-display">2023年 10月</h1>
            <div class="month-nav">
                <button id="prev-month" aria-label="前の月">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <button id="next-month" aria-label="次の月">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
            </div>
        </header>

        <section class="calendar-section">
            <div class="calendar-header-days">
                <span style="color: #fca5a5;">日</span>
                <span>月</span>
                <span>火</span>
                <span>水</span>
                <span>木</span>
                <span>金</span>
                <span style="color: #93c5fd;">土</span>
            </div>
            <div class="calendar-grid" id="calendar-container">
                <!-- 日付要素はJSで生成 -->
            </div>
        </section>

        <section class="events-section">
            <h2 class="events-title">予定リスト</h2>
            <ul class="event-list" id="event-list">
                <!-- 予定はJSで生成 -->
            </ul>
        </section>

        <!-- 予定追加用フォーム（日付選択時のみ表示/アクティブになる） -->
        <div class="input-panel hidden" id="input-panel">
            <div class="input-panel-header">
                <span id="selected-dates-text">日付を選択してください</span>
                <button id="cancel-selection" class="btn-cancel">キャンセル</button>
            </div>
            <div class="input-panel-body">
                <input type="text" id="event-input" placeholder="予定を入力..." autocomplete="off">
                <button id="add-event-btn" class="btn-primary">追加</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
