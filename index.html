<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Calendar</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="calendar-header">
            <button id="prevMonth" class="icon-btn" aria-label="Previous Month">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
            </button>
            <h1 id="currentMonthYear"></h1>
            <button id="nextMonth" class="icon-btn" aria-label="Next Month">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
            </button>
        </header>

        <!-- Calendar Grid -->
        <div class="calendar-wrapper">
            <div class="weekdays">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendarGrid" class="calendar-grid">
                <!-- Days will be generated by JS -->
            </div>
        </div>
    </div>

    <!-- Quick Add Popover (Floating) -->
    <div id="quickAddPopover" class="popover hidden">
        <input type="text" id="eventTitleInput" placeholder="予定を入力してEnter" autocomplete="off">
    </div>

    <!-- Day Details Modal -->
    <div id="detailsModal" class="modal-overlay hidden">
        <div class="modal-content glass">
            <button id="closeModal" class="close-btn">&times;</button>
            <h2 id="modalDateTitle"></h2>
            <div id="modalEventsList" class="events-list">
                <!-- Events will be populated here -->
            </div>
            <input type="text" id="modalAddInput" placeholder="さらに追加..." class="modal-add-input">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
